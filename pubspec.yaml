name: shop_app

description: Full POS Shop App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  pdf: ^3.10.7
  printing: ^5.12.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
flutter:
  uses-material-design: true
  assets:
    - assets/logo.png